{
"DhcpDdns":
{
  "ip-address": "127.0.0.1",
  "port": 53001,
  "control-socket": {
      "socket-type": "unix",
      "socket-name": "kea-ddns-ctrl-socket"
  },
  <?include "/etc/kea/tsig-keys.json"?>
  
  "forward-ddns" : {
  	"ddns-domains" : [
  		{
  			"name": "elsaiedadel.net.",
  			"key-name": "DHCP_UPDATER",
  			"dns-servers": [
  				{ "ip-address": "192.168.1.1" }
  			]
  		}
  	]	
  },
  
  "reverse-ddns" : {
  	"ddns-domains" : [
  		{
  			"name": "1.168.192.in-addr.arpa.",
  			"key-name": "DHCP_UPDATER",
  			"dns-servers": [
  				{ "ip-address": "192.168.1.1" }
  			]
  		}
  	]	
  },

  "loggers": [
    {
        "name": "kea-dhcp-ddns",
        "output-options": [
            {
                "output": "stdout",
                "pattern": "%-5p %m\n"

            }
        ],
        "severity": "INFO",

        "debuglevel": 0
    }
  ]
}
}
