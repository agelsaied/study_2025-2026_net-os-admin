<VirtualHost *:80>
	ServerAdmin webmaster@elsaiedadel.net
	DocumentRoot /var/www/html/www.elsaiedadel.net
	ServerName www.elsaiedadel.net
	ServerAlias www.elsaiedadel.net
	ErrorLog logs/www.elsaiedadel.net-error_log
	CustomLog logs/www.elsaiedadel.net-access_log common
	RewriteEngine on
	RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
	SSLEngine on
	ServerAdmin webmaster@elsaiedadel.net
	DocumentRoot /var/www/html/www.elsaiedadel.net
	ServerName www.elsaiedadel.net
	ServerAlias www.elsaiedadel.net
	ErrorLog logs/www.elsaiedadel.net-error_log
	CustomLog logs/www.elsaiedadel.net-access_log common
	SSLCertificateFile /etc/pki/tls/certs/www.elsaiedadel.net.crt
	SSLCertificateKeyFile /etc/pki/tls/private/www.elsaiedadel.net.key
</VirtualHost>
</IfModule>


